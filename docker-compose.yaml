# docker-compose.yaml
# Complete Court Command stack — all 5 services
#
# Local dev:   `docker compose up db redis ghost`   (run backend + frontend locally)
# Full stack:  `docker compose up`                  (everything in Docker)
# Coolify:     Deploy this file as a Docker Compose resource — one push, all services
#
# Set env vars in Coolify's UI or in a .env file locally.
# See .env.example for all available variables.
#
# NOTE: No host port bindings — Coolify's proxy handles external routing.
# For local dev, override with: docker compose -f docker-compose.yaml -f docker-compose.local.yaml up

services:
  db:
    image: postgres:17-alpine
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-courtcommand}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-courtcommand}
      POSTGRES_DB: ${POSTGRES_DB:-courtcommand}
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-courtcommand}"]
      interval: 5s
      timeout: 5s
      retries: 5
    restart: unless-stopped

  redis:
    image: redis:7-alpine
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 5s
      retries: 5
    restart: unless-stopped

  api:
    build:
      context: ./api
      dockerfile: Dockerfile
    expose:
      - "8080"
    environment:
      DATABASE_URL: ${DATABASE_URL:-postgres://courtcommand:courtcommand@db:5432/courtcommand?sslmode=disable}
      REDIS_URL: ${REDIS_URL:-redis://redis:6379/0}
      PORT: "8080"
      APP_ENV: ${APP_ENV:-production}
      CORS_ALLOWED_ORIGINS: ${CORS_ALLOWED_ORIGINS:-https://courtcommand.app,https://news.courtcommand.app}
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy
    volumes:
      - uploads:/app/uploads
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost:8080/api/v1/health"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 10s
    restart: unless-stopped

  web:
    build:
      context: ./web
      dockerfile: Dockerfile
      args:
        VITE_API_URL: ${VITE_API_URL:-https://api.courtcommand.app}
        VITE_GOOGLE_MAPS_API_KEY: ${VITE_GOOGLE_MAPS_API_KEY:-}
    expose:
      - "80"
    depends_on:
      api:
        condition: service_healthy
    restart: unless-stopped

  ghost:
    image: ghost:5
    expose:
      - "2368"
    environment:
      url: ${GHOST_URL:-https://news.courtcommand.app}
      database__client: sqlite3
      database__connection__filename: /var/lib/ghost/content/data/ghost.db
      NODE_ENV: production
    volumes:
      - ghost_content:/var/lib/ghost/content
    restart: unless-stopped

volumes:
  pgdata:
  uploads:
  ghost_content:
