# docker-compose.yml
# LOCAL DEV ONLY — Coolify deploys each service separately
#
# Development: `docker compose up` (db + redis + ghost, run backend locally)
# Full stack:  `docker compose --profile full up` (db + redis + ghost + backend)
#
# Production (Coolify separate services):
#   - PostgreSQL:  Coolify managed database
#   - Redis:       Coolify managed database
#   - Backend:     Docker build from backend/Dockerfile
#   - Frontend:    Docker build from frontend/Dockerfile
#   - Ghost:       ghost:5 image with env vars below
#
# See .env.example and frontend/.env.example for all environment variables.

services:
  db:
    image: postgres:17-alpine
    environment:
      POSTGRES_USER: courtcommand
      POSTGRES_PASSWORD: courtcommand
      POSTGRES_DB: courtcommand
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U courtcommand"]
      interval: 5s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 5s
      retries: 5

  ghost:
    image: ghost:5
    ports:
      - "2368:2368"
    environment:
      url: ${GHOST_URL:-http://localhost:2368}
      database__client: sqlite3
      database__connection__filename: /var/lib/ghost/content/data/ghost.db
      NODE_ENV: development
    volumes:
      - ghost_content:/var/lib/ghost/content

  backend:
    profiles: ["full"]
    build:
      context: ./backend
      dockerfile: Dockerfile
    ports:
      - "8080:8080"
    environment:
      DATABASE_URL: ${DATABASE_URL:-postgres://courtcommand:courtcommand@db:5432/courtcommand?sslmode=disable}
      REDIS_URL: ${REDIS_URL:-redis://redis:6379/0}
      PORT: "8080"
      ENV: ${ENV:-production}
      CORS_ALLOWED_ORIGINS: ${CORS_ALLOWED_ORIGINS:-http://localhost:5173,http://localhost:3000}
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy
    volumes:
      - uploads:/app/uploads
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost:8080/api/v1/health"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 10s

volumes:
  pgdata:
  uploads:
  ghost_content:
